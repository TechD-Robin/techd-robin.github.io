    <p>最近就是一個動森玩得有點過頭的 iOS 軟體工程師。在遊玩的過程中想到，如果能有個 App 用來記錄一些在島上與小動物們的互動狀態，好像也不錯，然後就寫了這個簡單的 App 了。</p>
    <p>偶爾會回來調整一些細節，最近也順手加了一個新的資料功能。基本上是我自己在用的東西，不過如果能順便幫助到其他玩家，那也很不錯。</p>
    <p>由於 App Store 不支援單純的贊助機制，因此個人選擇透過特定資料顯示限制，讓使用者可以選擇觀看廣告或付費解鎖限制的方式來支持開發。</p>
    <p>無論如何，我希望這款應用能在您的使用過程中帶來幫助。如果有任何問題，歡迎隨時聯繫我。</p>
    <p><strong>開發者：</strong>Robin Hsu</p>
